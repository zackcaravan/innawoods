# Codemagic CI/CD config for innawoods.
#
# Two workflows: `android` (Play Internal Testing AAB) and `ios` (TestFlight).
# Both inject SUPABASE_URL + SUPABASE_ANON_KEY at build time via
# `--dart-define`, so secrets live in Codemagic env-var groups, NOT in this
# file or the repo.
#
# ── One-time setup (Codemagic dashboard) ──────────────────────────────────────
#
# Env-var groups (Settings → Environment variables → groups):
#
#   supabase-prod        (used by BOTH workflows)
#     SUPABASE_URL          → https://njtefhpaaqblgdbbqspc.supabase.co
#     SUPABASE_ANON_KEY     → (the anon key — safe to ship, RLS still applies)
#
#   android-signing      (Android workflow)
#     CM_KEYSTORE              → upload the .jks file (binary)
#     CM_KEYSTORE_PASSWORD     → keystore password
#     CM_KEY_ALIAS             → key alias inside the keystore
#     CM_KEY_PASSWORD          → password for that alias
#
#   ios-signing          (iOS workflow)
#     IOS_CERT_KEY             → base64'd PEM of the persistent RSA key the
#                                Distribution certificate is issued against.
#                                Generated ONCE locally and stored here;
#                                reused on every build so we don't mint a
#                                fresh certificate (Apple's hard limit:
#                                one Distribution cert per team).
#                                  openssl genrsa -out cert_key.pem 2048
#                                  base64 -w 0 cert_key.pem  → paste value
#
# Android workflow EMAILS the signed AAB to the developer; manual upload
# to Play Console mirrors how Switchboard ships. No Play Console API or
# service account required.
#
#
# Integrations (Settings → Integrations):
#
#   app-store-connect    → ASC API Team Key. Codemagic uses this to manage
#                          iOS signing entirely on its own (cert + profile
#                          fetch-or-create), so the iOS workflow needs NO
#                          additional env vars beyond supabase-prod.
#
# App Store Connect & Google Play app records must already exist with bundle
# id `com.innawoods.innawoods`. APP_STORE_APPLE_ID below needs to be filled
# with the numeric ID assigned to the app once the record is created.

workflows:
  android:
    name: Android Play Store Release
    # No explicit instance_type — Codemagic picks the default the current
    # billing plan allows. Matches the Switchboard workflow pattern.
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - supabase-prod
        - android-signing
      vars:
        PACKAGE_NAME: com.innawoods.innawoods
    # Manual trigger only — matches the Switchboard workflow: push to main,
    # then click "Start new build" in the Codemagic dashboard.
    scripts:
      - name: Materialise keystore from env var
        # Codemagic stores the .jks blob as CM_KEYSTORE; write it to disk and
        # export CM_KEYSTORE_PATH so build.gradle.kts can pick it up via env.
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/innawoods.jks
          echo "CM_KEYSTORE_PATH=/tmp/innawoods.jks" >> $CM_ENV
      - name: Get dependencies
        script: flutter pub get
      - name: Generate Riverpod providers
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Build AAB (signed)
        # --build-number overrides the +N in pubspec.yaml so every CI
        # build gets a unique, monotonically-increasing versionCode.
        # Codemagic guarantees $PROJECT_BUILD_NUMBER never resets and
        # never skips, so this satisfies Play Console's strict
        # "versionCode must be > previous upload" rule without any
        # human bookkeeping. pubspec stays pinned at 1.0.0+1 as the
        # local-dev default.
        #
        # Single-line invocation with quoted env-var expansion: without
        # the quotes, stray whitespace inside the supabase env values
        # would word-split and Flutter would treat the URL as its
        # positional target arg.
        script: flutter build appbundle --release --build-number=$PROJECT_BUILD_NUMBER --dart-define=SUPABASE_URL="$SUPABASE_URL" --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/mapping/release/mapping.txt
    publishing:
      # Email the AAB after each successful build. Manual upload to the
      # Play Console mirrors the Switchboard workflow — no Google Play
      # API or service account required.
      email:
        recipients:
          - zack.caravan@gmail.com
        notify:
          success: true
          failure: true

  ios:
    name: iOS TestFlight Release
    # No explicit instance_type — Codemagic picks the default the current
    # billing plan allows. Matches the Switchboard workflow pattern.
    max_build_duration: 90
    integrations:
      app_store_connect: app-store-connect
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - supabase-prod
        # See setup notes at top of file. `ios-signing` group holds
        # IOS_CERT_KEY — the persistent RSA private key the signing
        # certificate was issued against. Without persistence, every
        # build generates a fresh key and tries to mint a new
        # certificate, hitting Apple's hard one-Distribution-cert-per-team
        # limit after the first run.
        - ios-signing
      vars:
        BUNDLE_ID: com.innawoods.innawoods
        APP_STORE_APPLE_ID: 6777637554
    # Manual trigger only — see notes on the Android workflow above.
    scripts:
      - name: Disable Swift Package Manager
        # Flutter started auto-adding SPM integration during `build ipa`,
        # which rewrites the Xcode project AFTER xcode-project use-profiles
        # has set up signing — clobbering the manual signing config and
        # leaving xcodebuild looking for a Development cert.
        #
        # Five of our plugins (permission_handler_apple, mobile_scanner,
        # flutter_secure_storage, flutter_local_notifications,
        # flutter_inappwebview_ios) don't support SPM yet, and CocoaPods
        # handles all of them fine. Opt out of SPM globally on the runner
        # before any signing or build steps touch the project. Same fix
        # the Switchboard workflow ships.
        script: flutter config --no-enable-swift-package-manager
      - name: Fetch / create iOS signing files
        # The 'app-store-connect' integration auto-injects three env vars
        # that the CLI picks up natively — APP_STORE_CONNECT_KEY_IDENTIFIER,
        # APP_STORE_CONNECT_ISSUER_ID, and APP_STORE_CONNECT_PRIVATE_KEY
        # (where the third is set to a '@file:PATH' reference pointing at
        # a pre-staged .p8 on the runner, NOT the raw PEM contents).
        #
        # IOS_CERT_KEY is the RSA private key the Distribution certificate
        # was issued against — stored once in the `ios-signing` env-var
        # group as a base64 blob. Why persist instead of generating fresh
        # each build: Apple enforces a hard one-Distribution-cert-per-team
        # limit, so a fresh-key-every-build approach mints exactly one cert
        # on its first run, then fails with a 409 on every subsequent run
        # because the new key doesn't match the existing cert and Apple
        # won't issue a second one.
        #
        # With a stable key, fetch-signing-files finds the cert that
        # already matches it on every run, no new-cert API call needed.
        script: |
          set -ex
          echo "$IOS_CERT_KEY" | base64 --decode > /tmp/cert_key.pem
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get dependencies
        script: flutter pub get
      - name: Pod install
        # find-based traversal matches Switchboard's pattern; tolerates
        # nested Podfiles if any plugin grows them in a future update.
        script: find . -name "Podfile" -execdir pod install \;
      - name: Generate Riverpod providers
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Build .ipa
        # --build-number overrides the +N in pubspec.yaml so every CI build
        # gets a unique CFBundleVersion. $PROJECT_BUILD_NUMBER is Codemagic's
        # monotonic project-wide counter (never resets, never skips), so we
        # don't need to query App Store Connect at build time — which the
        # previous "Bump build number to match TestFlight" step did with
        # get-latest-app-store-build-number, that queries the live App
        # Store and returns 0 for apps still in TestFlight, causing build 1
        # → ASC reject as "bundle version already used."
        #
        # Same approach the Android workflow uses, so the two platforms
        # share one ever-increasing counter. Single-line invocation with
        # quoted env-var expansion to defend against whitespace.
        script: flutter build ipa --release --build-number=$PROJECT_BUILD_NUMBER --dart-define=SUPABASE_URL="$SUPABASE_URL" --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
