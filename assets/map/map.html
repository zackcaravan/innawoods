<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>innawoods map</title>
  <script src="maplibre-gl.js"></script>
  <link href="maplibre-gl.css" rel="stylesheet" />
  <script src="pmtiles.js"></script>
  <style>
    html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const log = (m) => console.log('[map] ' + m);
    (async () => {
      try {
        const proto = new pmtiles.Protocol();
        maplibregl.addProtocol('pmtiles', proto.tile);
        const layers = await (await fetch('wa_layers.json')).json();
        // Make land fills semi-transparent so the shaded 3D terrain reads
        // THROUGH them (otherwise opaque green looks flat/pasted-on over relief).
        for (const l of layers) {
          if (l.type === 'fill' &&
              /(land|wood|forest|park|grass|natural|earth|scrub|glacier|sand)/i.test(l.id)) {
            l.paint = l.paint || {};
            l.paint['fill-opacity'] = 0.45;
          }
        }
        // Insert hillshade ABOVE the land fills (so its shading shows) but
        // BELOW roads/labels (first line/symbol layer).
        let insertAt = layers.findIndex((l) => l.type === 'line' || l.type === 'symbol');
        if (insertAt < 0) insertAt = layers.length;
        layers.splice(insertAt, 0, {
          id: 'hillshade', type: 'hillshade', source: 'dem',
          // OFF BY DEFAULT — user feedback: "trip mode (which disables
          // hillshade) looks great; default mode is broken". Tried lowering
          // exaggeration from 1.0 → 0.5 in commit b9c3463; still felt
          // visually overwhelming over the vector basemap. The honest fix
          // is to ship the cleaner topo look as the default. Users who
          // want relief shading can re-enable via the layers sheet toggle.
          layout: { visibility: 'none' },
          paint: {
            'hillshade-exaggeration': 0.6,
            'hillshade-shadow-color': '#2e2618',
            'hillshade-highlight-color': '#fbf7ec'
          }
        });
        const map = new maplibregl.Map({
          container: 'map',
          maxTileCacheSize: 40, // cap tile memory (GL pressure on phones)
          // Use the device's native pixel ratio for crisp 2D + crisp text.
          // (Capping this was a red herring during the 3D bughunt — the real
          // cause was sharing the DEM source w/ hillshade, fixed below.)
          // Do NOT call setPixelRatio() at runtime — resizing the GL surface
          // while the map is live silently kills the WebView render loop.
          pixelRatio: window.devicePixelRatio || 1,
          style: {
            version: 8,
            // Bundled (offline): glyphs and sprite ship in the app and are
            // served by the in-app tile server. Terrain DEM is still online —
            // Phase D will swap it for a bundled DEM per downloaded region.
            glyphs: location.origin + '/glyphs/{fontstack}/{range}.pbf',
            sprite: location.origin + '/sprite/light',
            sources: {
              protomaps: {
                type: 'vector',
                url: 'pmtiles://' + location.origin + '/wa.pmtiles',
                attribution: '© OpenStreetMap, © Protomaps'
              },
              dem: {
                type: 'raster-dem',
                // Proxied through the in-app server (same-origin, no CORS).
                tiles: [location.origin + '/dem/{z}/{x}/{y}.png'],
                encoding: 'terrarium', tileSize: 256, maxzoom: 10
              },
              // Terrain gets its OWN DEM source — MapLibre warns (and misbehaves)
              // if hillshade and 3D terrain share one source.
              demT: {
                type: 'raster-dem',
                tiles: [location.origin + '/dem/{z}/{x}/{y}.png'],
                encoding: 'terrarium', tileSize: 256, maxzoom: 10
              },
              // Online raster overlay sources. Sit dormant (visibility:none)
              // until the user toggles them on from the layers sheet.
              'usgs-topo': {
                type: 'raster',
                tiles: ['https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}'],
                tileSize: 256, maxzoom: 16,
                attribution: '© USGS'
              },
              // Esri World Imagery — global high-res satellite, free, no key.
              'sat-esri': {
                type: 'raster',
                tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                tileSize: 256, maxzoom: 19,
                attribution: '© Esri, Maxar, Earthstar Geographics'
              },
              // USGS aerial imagery (NAIP-derived, US only).
              'sat-usgs': {
                type: 'raster',
                tiles: ['https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryOnly/MapServer/tile/{z}/{y}/{x}'],
                tileSize: 256, maxzoom: 16,
                attribution: '© USGS'
              },
              // OpenTopoMap — hiker-friendly topo raster from SRTM + OSM.
              'opentopo': {
                type: 'raster',
                tiles: ['https://a.tile.opentopomap.org/{z}/{x}/{y}.png'],
                tileSize: 256, maxzoom: 17,
                attribution: '© OpenTopoMap (CC-BY-SA)'
              },
              // BLM Surface Management Agency — federal land ownership.
              'blm-sma': {
                type: 'raster',
                tiles: ['https://gis.blm.gov/arcgis/rest/services/lands/BLM_Natl_SMA_LimitedScale/MapServer/tile/{z}/{y}/{x}'],
                tileSize: 256, maxzoom: 13,
                attribution: '© BLM'
              },
              // NIFC current wildfire perimeters — live GeoJSON, populated by
              // setWildfires() below.
              wildfires: {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: [] }
              }
            },
            layers: layers
          },
          center: [-121.76, 46.79], zoom: 11, pitch: 0, bearing: 0, maxPitch: 85
        });

        // Scale bar is rendered Flutter-side instead of MapLibre's built-in
        // control — the built-in one ends up under the bottom drag handle and
        // can't be reliably repositioned.

        const EMPTY = { type: 'FeatureCollection', features: [] };
        // ---- Flutter <-> map bridge: party data is pushed in as GeoJSON ----
        window.setMembers = (gj) => {
          const s = map.getSource('members');
          log('setMembers ' + ((gj.features || []).length) + (s ? '' : ' [NO SOURCE]'));
          if (s) s.setData(gj);
        };
        window.setPins = (gj) => { const s = map.getSource('pins'); if (s) s.setData(gj); };
        window.setRoutes = (gj) => { const s = map.getSource('routes'); if (s) s.setData(gj); };
        window.setTrack = (gj) => { const s = map.getSource('track'); if (s) s.setData(gj); };
        window.setRouteWaypoints = (gj) => { const s = map.getSource('route-waypoints'); if (s) s.setData(gj); };
        window.setMeasure = (gj) => { const s = map.getSource('measure'); if (s) s.setData(gj); };

        // Surface mix — for each of N sample points along the route, look at
        // the closest currently-loaded `roads` feature and bucket by `kind`.
        // Returns a JSON {kind: fraction} or {"unknown": 1.0} if no tiles
        // are loaded. Limited to the visible portion of the route — tiles
        // outside the viewport haven't been fetched. The Dart side flies the
        // camera to the route bbox + waits for idle before calling this.
        window.surfaceMixForLine = (coordsJson) => {
          let coords;
          try { coords = JSON.parse(coordsJson); } catch (_) { return '{}'; }
          if (!coords || coords.length < 2) return '{}';
          // Cumulative screen-px distances (good enough for sampling).
          const cum = [0];
          for (let i = 1; i < coords.length; i++) {
            const a = map.project(coords[i - 1]);
            const b = map.project(coords[i]);
            cum.push(cum[i - 1] + Math.hypot(b.x - a.x, b.y - a.y));
          }
          const len = cum[cum.length - 1];
          if (len === 0) return '{}';
          const N = 200;
          const buckets = {};
          for (let i = 0; i < N; i++) {
            const t = i / (N - 1);
            const target = t * len;
            let seg = 1;
            while (seg < cum.length && cum[seg] < target) seg++;
            if (seg >= cum.length) seg = cum.length - 1;
            const segStart = cum[seg - 1];
            const segLen = cum[seg] - segStart;
            const lt = segLen === 0 ? 0 : (target - segStart) / segLen;
            const lng = coords[seg - 1][0] + (coords[seg][0] - coords[seg - 1][0]) * lt;
            const lat = coords[seg - 1][1] + (coords[seg][1] - coords[seg - 1][1]) * lt;
            const p = map.project([lng, lat]);
            const box = [[p.x - 10, p.y - 10], [p.x + 10, p.y + 10]];
            let feats = [];
            try {
              feats = map.queryRenderedFeatures(box).filter(f =>
                f.source === 'protomaps' &&
                f.sourceLayer === 'roads' &&
                f.properties && f.properties.kind);
            } catch (_) {}
            const kind = feats.length ? feats[0].properties.kind : 'unknown';
            buckets[kind] = (buckets[kind] || 0) + 1;
          }
          const out = {};
          for (const k of Object.keys(buckets)) out[k] = buckets[k] / N;
          return JSON.stringify(out);
        };

        // Fly to fit a bounding box (lng/lat extents) — used to load tiles
        // along a route before sampling surface mix.
        window.fitBounds = (sw_lng, sw_lat, ne_lng, ne_lat) => {
          map.fitBounds([[sw_lng, sw_lat], [ne_lng, ne_lat]],
            { padding: 60, animate: true, duration: 600 });
        };

        // Convert a screen (x,y) point to lat/lng — used by the freehand
        // drawing overlay to translate finger taps into route geometry.
        window.screenToLatLng = (x, y) => {
          const c = map.unproject([x, y]);
          return JSON.stringify({ lng: c.lng, lat: c.lat });
        };

        // Variant of flyTo that keeps the camera at a caller-chosen zoom
        // (vs. snapping to a default). Used by Recenter so the user's
        // current zoom is preserved when they hop back to themselves.
        window.flyToZoom = (lng, lat, zoom) => {
          map.flyTo({ center: [lng, lat], zoom: zoom, duration: 600 });
        };

        // Pan the camera by a pixel offset, no animation. Called from the
        // Flutter freehand overlay when the user does a two-finger drag,
        // since that overlay sits above the WebView and would otherwise
        // swallow the gesture.
        window.panBy = (dx, dy) => {
          map.panBy([dx, dy], { animate: false });
        };

        // Apply an incremental zoom around a pixel-space anchor. Same
        // origin story as panBy — two-finger pinch routed from Flutter.
        window.zoomBy = (deltaZ, anchorX, anchorY) => {
          const cur = map.getZoom();
          const target = Math.min(22, Math.max(0, cur + deltaZ));
          map.easeTo({
            zoom: target,
            around: map.unproject([anchorX, anchorY]),
            duration: 0,
          });
        };

        // Rotate the camera by a delta (degrees) around a pixel-space
        // anchor. Two-finger twist routed from Flutter.
        window.rotateBy = (deltaBearing, anchorX, anchorY) => {
          const cur = map.getBearing();
          map.easeTo({
            bearing: cur + deltaBearing,
            around: map.unproject([anchorX, anchorY]),
            duration: 0,
          });
        };

        // Tilt the camera by a delta (degrees). MapLibre clamps to
        // [0, 85]; pitching with a two-finger vertical drag motion when
        // the fingers stay close in X is the standard convention.
        window.pitchBy = (deltaPitch) => {
          const cur = map.getPitch();
          const target = Math.min(85, Math.max(0, cur + deltaPitch));
          map.easeTo({ pitch: target, duration: 0 });
        };

        // Hard repaint — used by Recenter to reload the visible viewport
        // (in case a tile got stuck mid-stream and the map looks stale).
        window.refreshMap = () => {
          try {
            map.triggerRepaint();
            // Force the basemap sources to refetch tiles for the current
            // viewport. Walking through known sources is safer than
            // assuming names.
            const ids = ['protomaps', 'dem', 'dem-terrain'];
            for (const id of ids) {
              const src = map.getSource(id);
              if (src && typeof src.reload === 'function') {
                src.reload();
              }
            }
          } catch (_) {}
        };

        // Fires once whenever the user actually moves the map themselves
        // (drag / pinch / rotate). Programmatic flyTo / setBearing don't
        // trigger this. Flutter listens to disable follow-mode the moment
        // the user manually pans.
        let _userInteracting = false;
        function _emitUserPan() {
          if (window.flutter_inappwebview) {
            window.flutter_inappwebview.callHandler('userPan');
          }
        }
        // dragstart/rotatestart/pitchstart with originalEvent set means
        // a real touch/mouse drove the change.
        for (const ev of ['dragstart', 'rotatestart', 'pitchstart',
                          'zoomstart']) {
          map.on(ev, (e) => {
            if (e && e.originalEvent) _emitUserPan();
          });
        }

        // Batch-convert an array of [x,y] screen points to [lng,lat] map
        // coords. Used by the freehand draw overlay after pan-end.
        window.screenPointsToLatLngs = (xyJson) => {
          let xys;
          try { xys = JSON.parse(xyJson); } catch (_) { return '[]'; }
          const out = xys.map(([x, y]) => {
            const c = map.unproject([x, y]);
            return [c.lng, c.lat];
          });
          return JSON.stringify(out);
        };

        // ----- Map matching -------------------------------------------------
        //
        // Snaps a freehand-drawn polyline to the loaded road/trail network.
        // For ≥3 observations and a graph rich enough to matter we run a
        // proper HMM/Viterbi matcher; otherwise we fall back to per-point
        // nearest-edge projection. The HMM picks edges by combining:
        //   • emission ~ exp(-d²/(2σ²))   d = drawn→edge perpendicular dist (m)
        //   • transition ~ exp(-|drawn - graph| / β)
        //                                  drawn = great-circle between obs
        //                                  graph = shortest path on the road
        //                                          graph between the two
        //                                          projected points
        // Reconstruction chains the chosen edges through their shortest paths
        // so the returned polyline traces real road geometry across
        // intersections, not just teleport-snaps at each observation.

        // Earth-radius haversine in meters.
        function _haversineM(a, b) {
          const R = 6371008.8;
          const toRad = Math.PI / 180;
          const dLat = (b[1] - a[1]) * toRad;
          const dLng = (b[0] - a[0]) * toRad;
          const la1 = a[1] * toRad, la2 = b[1] * toRad;
          const s = Math.sin(dLat / 2) ** 2 +
                    Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) ** 2;
          return 2 * R * Math.asin(Math.sqrt(s));
        }

        // Round a coord to ~1m on the ground (lat 1e-5 ≈ 1.11m) so duplicate
        // vertices from different tiles collapse into one graph node.
        function _nodeKey(c) {
          return c[0].toFixed(5) + ',' + c[1].toFixed(5);
        }

        // Project (lng,lat) onto edge a→b. Returns { t, point, distMeters }.
        function _projectOnEdge(coord, a, b) {
          const p = map.project(coord);
          const A = map.project(a), B = map.project(b);
          const dx = B.x - A.x, dy = B.y - A.y;
          const len2 = dx * dx + dy * dy;
          if (len2 === 0) {
            return { t: 0, point: a, distMeters: _haversineM(coord, a) };
          }
          let t = ((p.x - A.x) * dx + (p.y - A.y) * dy) / len2;
          t = Math.max(0, Math.min(1, t));
          const px = A.x + t * dx, py = A.y + t * dy;
          const c = map.unproject([px, py]);
          return {
            t,
            point: [c.lng, c.lat],
            distMeters: _haversineM(coord, [c.lng, c.lat]),
          };
        }

        // Tiny binary min-heap for bounded Dijkstra.
        class _MinHeap {
          constructor() { this.h = []; }
          push(item) {
            this.h.push(item);
            let i = this.h.length - 1;
            while (i > 0) {
              const p = (i - 1) >> 1;
              if (this.h[p][0] <= this.h[i][0]) break;
              [this.h[p], this.h[i]] = [this.h[i], this.h[p]];
              i = p;
            }
          }
          pop() {
            const top = this.h[0];
            const last = this.h.pop();
            if (this.h.length > 0) {
              this.h[0] = last;
              let i = 0;
              const n = this.h.length;
              while (true) {
                let l = i * 2 + 1, r = l + 1, m = i;
                if (l < n && this.h[l][0] < this.h[m][0]) m = l;
                if (r < n && this.h[r][0] < this.h[m][0]) m = r;
                if (m === i) break;
                [this.h[i], this.h[m]] = [this.h[m], this.h[i]];
                i = m;
              }
            }
            return top;
          }
          get size() { return this.h.length; }
        }

        // Build an adjacency-list graph from the loaded road features.
        // Each edge carries its OSM `kind` so the routing weights can
        // prefer trails + rural roads over highways. The snap-to-trail
        // path ignores `kind` (uniform weights); the routing path uses it.
        function _buildRoadGraph() {
          const nodes = new Map();
          const edges = [];
          let roads = [];
          try {
            roads = map.querySourceFeatures('protomaps',
              { sourceLayer: 'roads' });
          } catch (_) { return { nodes, edges }; }
          const seen = new Set();
          for (const r of roads) {
            const g = r.geometry;
            const kind = (r.properties && r.properties.kind) || 'other';
            const lines = g.type === 'LineString' ? [g.coordinates] :
                          g.type === 'MultiLineString' ? g.coordinates : [];
            for (const ls of lines) {
              for (let i = 0; i < ls.length - 1; i++) {
                const ac = ls[i], bc = ls[i + 1];
                const a = _nodeKey(ac), b = _nodeKey(bc);
                if (a === b) continue;
                const dedup = a < b ? a + '|' + b : b + '|' + a;
                if (seen.has(dedup)) continue;
                seen.add(dedup);
                const len = _haversineM(ac, bc);
                const id = edges.length;
                edges.push({ a, b, ac, bc, len, id, kind });
                if (!nodes.has(a)) nodes.set(a, { coord: ac, edges: [] });
                if (!nodes.has(b)) nodes.set(b, { coord: bc, edges: [] });
                nodes.get(a).edges.push({ to: b, len, id, kind });
                nodes.get(b).edges.push({ to: a, len, id, kind });
              }
            }
          }
          return { nodes, edges };
        }

        // Cost multiplier per OSM `kind`. Together with edge length these
        // are what the rural-router minimises. Tuned so that:
        //   - a path/track is cheaper per meter than any road
        //   - minor (residential) roads are mildly penalised
        //   - major roads are heavily penalised (3x)
        //   - highways are very heavily penalised (5x)
        // Net effect: Dijkstra picks the longer trail over the shorter
        // highway shortcut as long as the trail isn't more than ~5x the
        // straight-line distance.
        function _ruralCostMul(kind) {
          switch (kind) {
            case 'path':       return 1.0;   // OSM footway / path
            case 'other':      return 1.0;   // unclassified tracks / forest roads
            case 'minor_road': return 1.2;   // residential / tertiary
            case 'major_road': return 3.0;   // primary / secondary
            case 'highway':    return 5.0;   // motorway / trunk
            case 'pedestrian': return 1.1;
            default:           return 1.5;
          }
        }

        // Weighted Dijkstra used for rural-router pathfinding. Same shape as
        // _dijkstraWithPrev but each edge contributes `len * costMul` to the
        // accumulated distance, biasing the search toward trail-heavy paths.
        // The recorded `dist` is the WEIGHTED cost; the polyline length
        // measured at the end is the literal meters.
        function _dijkstraRural(graph, startEdge, startT, maxCost) {
          const dist = new Map();
          const prev = new Map();
          const heap = new _MinHeap();
          const startMul = _ruralCostMul(startEdge.kind);
          const dA = startEdge.len * startT * startMul;
          const dB = startEdge.len * (1 - startT) * startMul;
          dist.set(startEdge.a, dA);
          dist.set(startEdge.b, dB);
          heap.push([dA, startEdge.a]);
          heap.push([dB, startEdge.b]);
          let visited = 0;
          while (heap.size && visited < 8000) {
            const [d, u] = heap.pop();
            if (d > (dist.get(u) ?? Infinity)) continue;
            if (d > maxCost) break;
            visited++;
            const node = graph.nodes.get(u);
            if (!node) continue;
            for (const e of node.edges) {
              const mul = _ruralCostMul(e.kind);
              const nd = d + e.len * mul;
              if (nd > maxCost) continue;
              if (nd < (dist.get(e.to) ?? Infinity)) {
                dist.set(e.to, nd);
                prev.set(e.to, u);
                heap.push([nd, e.to]);
              }
            }
          }
          return { dist, prev };
        }

        // Public entry point: route from (fromLng, fromLat) to
        // (toLng, toLat) using whatever road graph is currently loaded.
        // Returns JSON of the form:
        //   { coords: [[lng,lat], ...], distM: 1234.5, found: true }
        //   { coords: [], distM: 0, found: false, reason: '...' }
        //
        // `found: false` is the honest answer when the graph is empty
        // (no road tiles loaded yet) or when the endpoints are outside
        // routable range. Callers should surface this to the user rather
        // than render a straight line as if it were a route.
        window.routeBetween = (fromLng, fromLat, toLng, toLat) => {
          const graph = _buildRoadGraph();
          if (graph.edges.length < 2) {
            return JSON.stringify({ coords: [], distM: 0,
              found: false,
              reason: 'No road data loaded — pan the route into view first.' });
          }
          // Project both endpoints onto their nearest edges in the graph.
          function project(lng, lat) {
            let best = null;
            for (const e of graph.edges) {
              const p = _projectOnEdge([lng, lat], e.ac, e.bc);
              if (!best || p.distMeters < best.distMeters) {
                best = { edge: e, t: p.t, point: p.point, distMeters: p.distMeters };
              }
            }
            return best;
          }
          const start = project(fromLng, fromLat);
          const end = project(toLng, toLat);
          if (!start || !end) {
            return JSON.stringify({ coords: [], distM: 0,
              found: false, reason: 'Endpoint not near any road.' });
          }
          if (start.distMeters > 1000 || end.distMeters > 1000) {
            return JSON.stringify({ coords: [], distM: 0,
              found: false,
              reason: 'Endpoint too far from any loaded road (>1km).' });
          }
          // Same-edge shortcut.
          if (start.edge.id === end.edge.id) {
            const coords = [start.point, end.point];
            return JSON.stringify({ coords, distM: _haversineM(coords[0], coords[1]),
              found: true });
          }
          // Generous weighted cost budget — ~150km × 5x highway penalty.
          // Sounds extreme but most realistic backcountry distances are
          // well within this, and Dijkstra short-circuits on the heap
          // once it overshoots so the cap is mostly a safety valve.
          const dijk = _dijkstraRural(graph, start.edge, start.t, 750000);
          // Find the cheapest reachable endpoint of the target edge.
          const endMul = _ruralCostMul(end.edge.kind);
          const costA = dijk.dist.get(end.edge.a);
          const costB = dijk.dist.get(end.edge.b);
          if (costA == null && costB == null) {
            return JSON.stringify({ coords: [], distM: 0,
              found: false,
              reason: 'No path within loaded tiles.' });
          }
          // Reconstruct via the existing helper (which handles the leading
          // and trailing edge fractions).
          const coords = _reconstructPath(graph, start.edge, start.t,
              end.edge, end.t, dijk);
          // Total polyline length in meters.
          let distM = 0;
          for (let i = 1; i < coords.length; i++) {
            distM += _haversineM(coords[i - 1], coords[i]);
          }
          return JSON.stringify({ coords, distM, found: true });
        };

        // ---- Turn-by-turn maneuver classification ----------------------
        // Convert a routed polyline to a list of meaningful "turns" with
        // their cumulative distance from the start. Voice or banner UIs
        // use this to surface "In 200m, turn right."
        //
        // Algorithm: compute the heading change at each interior vertex.
        // Small changes (<= ~25°) are noise from polyline detail and get
        // skipped; bigger ones are classified into 7 buckets covering the
        // realistic gamut of off-road maneuvers. The first and last entry
        // are always emitted as "Depart" and "Arrive" so the UI has
        // bookends without special cases.
        function _bearingDeg(a, b) {
          // Standard great-circle initial bearing.
          const toRad = (x) => x * Math.PI / 180;
          const toDeg = (x) => x * 180 / Math.PI;
          const lat1 = toRad(a[1]), lat2 = toRad(b[1]);
          const dLng = toRad(b[0] - a[0]);
          const y = Math.sin(dLng) * Math.cos(lat2);
          const x = Math.cos(lat1) * Math.sin(lat2)
                  - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
          let brng = toDeg(Math.atan2(y, x));
          return (brng + 360) % 360;
        }
        function _classifyTurn(deltaDeg) {
          // deltaDeg is in (-180, 180]. Positive = right, negative = left.
          const a = Math.abs(deltaDeg);
          if (a < 25)  return 'continue';
          if (a < 60)  return deltaDeg > 0 ? 'slight_right' : 'slight_left';
          if (a < 120) return deltaDeg > 0 ? 'right'        : 'left';
          if (a < 160) return deltaDeg > 0 ? 'sharp_right'  : 'sharp_left';
          return 'uturn';
        }
        window.maneuversFor = (coordsJson) => {
          let coords;
          try { coords = JSON.parse(coordsJson); }
          catch (_) { return JSON.stringify([]); }
          if (!coords || coords.length < 2) return JSON.stringify([]);

          // Cumulative distance per vertex.
          const cum = [0];
          for (let i = 1; i < coords.length; i++) {
            cum.push(cum[i - 1] + _haversineM(coords[i - 1], coords[i]));
          }
          const totalM = cum[cum.length - 1];

          const out = [{
            type: 'depart',
            distFromStartM: 0,
            distFromPrevM: 0,
            lng: coords[0][0], lat: coords[0][1],
          }];
          for (let i = 1; i < coords.length - 1; i++) {
            const b1 = _bearingDeg(coords[i - 1], coords[i]);
            const b2 = _bearingDeg(coords[i], coords[i + 1]);
            let delta = b2 - b1;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            const type = _classifyTurn(delta);
            if (type === 'continue') continue;
            const distFromStart = cum[i];
            const distFromPrev = distFromStart - out[out.length - 1].distFromStartM;
            // Suppress micro-turns within 30m of the previous one — those
            // are usually polyline detail at intersections, not separate
            // instructions.
            if (distFromPrev < 30) continue;
            out.push({
              type,
              distFromStartM: distFromStart,
              distFromPrevM: distFromPrev,
              lng: coords[i][0], lat: coords[i][1],
            });
          }
          out.push({
            type: 'arrive',
            distFromStartM: totalM,
            distFromPrevM: totalM - out[out.length - 1].distFromStartM,
            lng: coords[coords.length - 1][0],
            lat: coords[coords.length - 1][1],
          });
          return JSON.stringify(out);
        };

        // Bounded Dijkstra from a point on `edge` (parameter t). Returns
        // a map node-key → distance in meters, capped at `maxDist`.
        function _dijkstraFromEdgePoint(graph, edge, t, maxDist) {
          const dist = new Map();
          const heap = new _MinHeap();
          const dA = edge.len * t;
          const dB = edge.len * (1 - t);
          dist.set(edge.a, dA);
          dist.set(edge.b, dB);
          heap.push([dA, edge.a]);
          heap.push([dB, edge.b]);
          let visited = 0;
          while (heap.size && visited < 200) {
            const [d, u] = heap.pop();
            if (d > (dist.get(u) ?? Infinity)) continue;
            if (d > maxDist) break;
            visited++;
            const node = graph.nodes.get(u);
            if (!node) continue;
            for (const e of node.edges) {
              const nd = d + e.len;
              if (nd > maxDist) continue;
              if (nd < (dist.get(e.to) ?? Infinity)) {
                dist.set(e.to, nd);
                heap.push([nd, e.to]);
              }
            }
          }
          return dist;
        }

        // Dijkstra that also tracks predecessor — used during geometry
        // reconstruction so we can walk the actual path between two
        // edge-projected points instead of teleporting.
        function _dijkstraWithPrev(graph, startEdge, startT, maxDist) {
          const dist = new Map();
          const prev = new Map();
          const heap = new _MinHeap();
          const dA = startEdge.len * startT;
          const dB = startEdge.len * (1 - startT);
          dist.set(startEdge.a, dA);
          dist.set(startEdge.b, dB);
          heap.push([dA, startEdge.a]);
          heap.push([dB, startEdge.b]);
          let visited = 0;
          while (heap.size && visited < 400) {
            const [d, u] = heap.pop();
            if (d > (dist.get(u) ?? Infinity)) continue;
            if (d > maxDist) break;
            visited++;
            const node = graph.nodes.get(u);
            if (!node) continue;
            for (const e of node.edges) {
              const nd = d + e.len;
              if (nd > maxDist) continue;
              if (nd < (dist.get(e.to) ?? Infinity)) {
                dist.set(e.to, nd);
                prev.set(e.to, u);
                heap.push([nd, e.to]);
              }
            }
          }
          return { dist, prev };
        }

        function _walkBack(prev, end) {
          const chain = [end];
          let cur = end;
          let guard = 0;
          while (prev.has(cur) && guard++ < 500) {
            cur = prev.get(cur);
            chain.push(cur);
          }
          chain.reverse();
          return chain;
        }

        function _interp(a, b, t) {
          return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
        }

        // Reconstruct the polyline going from a projection on startEdge to
        // a projection on targetEdge, by walking the Dijkstra prev map and
        // joining the leading/trailing edge fractions.
        function _reconstructPath(graph, startEdge, startT, targetEdge,
                                  targetT, dijk) {
          const startCoord = _interp(startEdge.ac, startEdge.bc, startT);
          const endCoord = _interp(targetEdge.ac, targetEdge.bc, targetT);
          // Pick whichever of targetEdge's endpoints is closer via the graph.
          const distA = dijk.dist.get(targetEdge.a);
          const distB = dijk.dist.get(targetEdge.b);
          let reachedKey;
          if (distA != null && distB != null) {
            // Prefer the endpoint that, combined with the trailing fraction,
            // yields the shorter overall path.
            const totalA = distA + targetT * targetEdge.len;
            const totalB = distB + (1 - targetT) * targetEdge.len;
            reachedKey = totalA <= totalB ? targetEdge.a : targetEdge.b;
          } else if (distA != null) {
            reachedKey = targetEdge.a;
          } else if (distB != null) {
            reachedKey = targetEdge.b;
          } else {
            // No path within budget — fall back to a direct line.
            return [startCoord, endCoord];
          }
          const chain = _walkBack(dijk.prev, reachedKey);
          const pts = [startCoord];
          for (const k of chain) {
            const node = graph.nodes.get(k);
            if (node) pts.push(node.coord);
          }
          pts.push(endCoord);
          return pts;
        }

        // Per-point nearest-edge fallback (the Phase-1 behaviour). Used
        // when input is too sparse for HMM to matter, or HMM bailed out.
        // 60 m threshold ≈ half a city block — aggressive enough that
        // typical taps "near" a trail get grabbed onto it, conservative
        // enough that we don't snap to roads in a different valley.
        function _snapNearestEdge(coords, graph) {
          if (graph.edges.length === 0) return JSON.stringify(coords);
          const out = coords.map(([lng, lat]) => {
            let bestDist = Infinity, bestPt = null;
            for (const e of graph.edges) {
              const proj = _projectOnEdge([lng, lat], e.ac, e.bc);
              if (proj.distMeters < bestDist) {
                bestDist = proj.distMeters;
                bestPt = proj.point;
              }
            }
            if (bestDist > 60 || bestPt == null) return [lng, lat];
            return bestPt;
          });
          return JSON.stringify(out);
        }

        function _runHmm(obs, graph) {
          const K = 6;                 // candidates per observation (was 4)
          const sigmaM = 30;           // emission stddev m (was 20 — looser)
          const beta = 50;             // transition lengthscale (m)
          const maxJumpFactor = 3;     // shortest-path search cap per step

          // 1. Candidates per observation: K nearest edges by projection.
          const cands = obs.map((o) => {
            const scored = [];
            for (const e of graph.edges) {
              const proj = _projectOnEdge(o, e.ac, e.bc);
              scored.push({ edge: e, t: proj.t, point: proj.point,
                            distM: proj.distMeters });
            }
            scored.sort((a, b) => a.distM - b.distM);
            // 200 m cap (was 100 m) so taps a parking-lot away from the
            // trail still match. HMM transitions still penalise wildly
            // distant matches via beta, so loosening this doesn't break
            // the path-finding — it just stops us bailing too early when
            // the user's freehand drift takes them a bit off the line.
            return scored.slice(0, K).filter((c) => c.distM <= 200);
          });
          for (const c of cands) if (c.length === 0) return null;

          const obsStep = [];
          for (let i = 1; i < obs.length; i++) {
            obsStep.push(_haversineM(obs[i - 1], obs[i]));
          }

          // 2. Viterbi in log-space.
          const NEG_INF = -1e9;
          const T = obs.length;
          const dp = new Array(T);
          const back = new Array(T);
          dp[0] = cands[0].map((c) =>
            -(c.distM * c.distM) / (2 * sigmaM * sigmaM));
          back[0] = cands[0].map(() => -1);

          for (let t = 1; t < T; t++) {
            const here = cands[t];
            const prev = cands[t - 1];
            const stepDrawn = obsStep[t - 1];
            const maxJump = Math.max(stepDrawn * maxJumpFactor, 100);
            dp[t] = new Array(here.length).fill(NEG_INF);
            back[t] = new Array(here.length).fill(-1);
            for (let i = 0; i < prev.length; i++) {
              if (dp[t - 1][i] <= NEG_INF) continue;
              const dists = _dijkstraFromEdgePoint(
                  graph, prev[i].edge, prev[i].t, maxJump);
              for (let j = 0; j < here.length; j++) {
                let graphDist;
                if (prev[i].edge.id === here[j].edge.id) {
                  graphDist = Math.abs(here[j].t - prev[i].t) *
                              prev[i].edge.len;
                } else {
                  const dA = (dists.get(here[j].edge.a) ?? Infinity) +
                             here[j].t * here[j].edge.len;
                  const dB = (dists.get(here[j].edge.b) ?? Infinity) +
                             (1 - here[j].t) * here[j].edge.len;
                  graphDist = Math.min(dA, dB);
                }
                if (!isFinite(graphDist)) continue;
                const logTrans = -Math.abs(stepDrawn - graphDist) / beta;
                const emission = -(here[j].distM * here[j].distM) /
                                 (2 * sigmaM * sigmaM);
                const score = dp[t - 1][i] + logTrans + emission;
                if (score > dp[t][j]) {
                  dp[t][j] = score;
                  back[t][j] = i;
                }
              }
            }
          }

          // 3. Best terminal state + traceback.
          let bestEnd = 0;
          for (let j = 1; j < dp[T - 1].length; j++) {
            if (dp[T - 1][j] > dp[T - 1][bestEnd]) bestEnd = j;
          }
          if (dp[T - 1][bestEnd] <= NEG_INF) return null;
          const path = new Array(T);
          path[T - 1] = bestEnd;
          for (let t = T - 1; t > 0; t--) {
            path[t - 1] = back[t][path[t]];
            if (path[t - 1] < 0) return null;
          }

          // 4. Reconstruct geometry — chain shortest paths between
          // consecutive chosen edges so the line follows real roads.
          const out = [cands[0][path[0]].point];
          for (let t = 1; t < T; t++) {
            const prevC = cands[t - 1][path[t - 1]];
            const curC = cands[t][path[t]];
            if (prevC.edge.id === curC.edge.id) {
              out.push(curC.point);
              continue;
            }
            const stepDrawn = obsStep[t - 1];
            const maxJump = Math.max(stepDrawn * maxJumpFactor, 100);
            const dijk = _dijkstraWithPrev(
                graph, prevC.edge, prevC.t, maxJump);
            const seg = _reconstructPath(
                graph, prevC.edge, prevC.t, curC.edge, curC.t, dijk);
            for (let k = 1; k < seg.length; k++) out.push(seg[k]);
          }
          return out;
        }

        // Public entry point invoked from Dart after a freehand pan-end.
        window.snapToRoads = (coordsJson) => {
          let coords;
          try { coords = JSON.parse(coordsJson); }
          catch (_) { return coordsJson; }
          if (!coords || coords.length < 2) return coordsJson;
          const graph = _buildRoadGraph();
          if (graph.edges.length < 4 || coords.length < 3) {
            return _snapNearestEdge(coords, graph);
          }
          try {
            const matched = _runHmm(coords, graph);
            if (matched && matched.length >= 2) return JSON.stringify(matched);
          } catch (_) { /* fall through */ }
          return _snapNearestEdge(coords, graph);
        };

        // Off-road style — mute highways + amplify trails. Reversible.
        // We track per-layer original paint values so toggling back restores
        // the basemap exactly.
        const _origPaint = {};
        window.setOffRoadStyle = (on) => {
          // Highways + major roads — make narrower + a touch muted.
          const dim = ['roads_highway', 'roads_major', 'roads_bridges_highway',
            'roads_bridges_major', 'roads_link', 'roads_bridges_link'];
          for (const lid of dim) {
            if (!map.getLayer(lid)) continue;
            if (on) {
              if (!_origPaint[lid]) {
                _origPaint[lid] = {
                  width: map.getPaintProperty(lid, 'line-width'),
                  color: map.getPaintProperty(lid, 'line-color'),
                };
              }
              // Reduce width by ~40%; tint slightly toward tan.
              map.setPaintProperty(lid, 'line-width', [
                'interpolate', ['linear'], ['zoom'],
                8, 0.6, 12, 1.2, 16, 3,
              ]);
              map.setPaintProperty(lid, 'line-color', '#c89a5c');
            } else if (_origPaint[lid]) {
              map.setPaintProperty(lid, 'line-width', _origPaint[lid].width);
              map.setPaintProperty(lid, 'line-color', _origPaint[lid].color);
            }
          }
          // (Was: rebrand the old overlay-trails layer here. That layer is
          // now a noop — see comment near its addLayer. The off-road style
          // doesn't need to do anything for trails; the colored split
          // layers already provide the visual distinction the user wants.)
          // Off-road style ENABLES hillshade (default is off now). Off-road
          // users typically want dramatic relief shading; the rest get the
          // cleaner topo look. Trip mode still forces hillshade off via
          // setHillshade(false) regardless of this.
          if (map.getLayer('hillshade')) {
            map.setLayoutProperty('hillshade', 'visibility',
                on ? 'visible' : 'none');
            map.setPaintProperty('hillshade', 'hillshade-exaggeration',
                on ? 0.8 : 0.6);
          }
        };
        // Terrain height multiplier. 1.0 ≈ true-to-life; higher = more dramatic.
        let demExag = 1.2;
        let terrainOn = false;
        window.setMode = (is3d) => {
          terrainOn = is3d;
          // Terrain first so the DEM source starts loading, then tilt the camera.
          // Use the dedicated `demT` source — sharing the hillshade `dem` source
          // deadlocks the WebView render loop on setTerrain.
          map.setTerrain(is3d ? { source: 'demT', exaggeration: demExag } : null);
          map.easeTo({ pitch: is3d ? 55 : 0, duration: 600 });
        };
        // Toggle the always-on relief shading. Trip-mode suppresses it to
        // save GPU + DEM-fetch battery; user-driven 3D still works (the 3D
        // tilt uses a separate `demT` source that's loaded on demand).
        window.setHillshade = (on) => {
          if (map.getLayer('hillshade')) {
            map.setLayoutProperty('hillshade', 'visibility',
              on ? 'visible' : 'none');
          }
        };

        // Find every trail/road segment in the loaded PMTiles cache whose
        // `name` matches the given string. Returns a JSON array of
        // LineStrings (each is an array of [lng,lat]).
        //
        // querySourceFeatures (vs queryRenderedFeatures): source-features
        // sees all features in loaded tiles, regardless of current viewport.
        // For a long trail that runs partway off-screen, that's the
        // difference between getting the visible 10% and getting everything
        // the renderer has cached. Still bounded by which tiles have been
        // loaded — the user has to have panned across the trail at some
        // point — but no longer bounded by what's pixel-visible right now.
        //
        // Dart then chains the LineStrings head-to-tail by endpoint
        // proximity. See _assembleNamedTrail.
        window.queryTrailByName = (name) => {
          if (!name) return JSON.stringify([]);
          const src = map.getSource('protomaps');
          if (!src) return JSON.stringify([]);
          let hits = [];
          try {
            hits = map.querySourceFeatures('protomaps', {
              sourceLayer: 'roads',
              filter: ['==', ['get', 'name'], name],
            }) || [];
          } catch (e) {
            // sourceLayer / filter combination may not be supported on some
            // MapLibre builds — fall back to the old rendered query so the
            // feature degrades gracefully instead of breaking.
            const trailLayers = [
              'roads_hike', 'roads_orv', 'roads_other',
              'roads_bridges_other', 'roads_tunnels_other',
            ].filter(id => !!map.getLayer(id));
            hits = map.queryRenderedFeatures({ layers: trailLayers });
          }
          const out = [];
          for (const f of hits) {
            const fname = (f.properties && f.properties.name) || '';
            if (fname !== name) continue;
            if (f.geometry.type === 'LineString') {
              out.push(f.geometry.coordinates);
            } else if (f.geometry.type === 'MultiLineString') {
              for (const c of f.geometry.coordinates) out.push(c);
            }
          }
          return JSON.stringify(out);
        };
        // Toggle a named overlay layer on/off (driven by the layers sheet).
        window.setOverlay = (id, visible) => {
          // Wildfires has TWO layers behind the single id 'wildfires'.
          if (id === 'wildfires') {
            for (const lid of ['wildfires-fill', 'wildfires-line']) {
              if (map.getLayer(lid)) {
                map.setLayoutProperty(lid, 'visibility', visible ? 'visible' : 'none');
              }
            }
            if (visible) window.refreshWildfires();
            return;
          }
          // Trails & tracks: redirect to setTrailsOverlay so the activity
          // filter is respected (we don't want the old single-layer toggle
          // here, since the colored split layers replaced overlay-trails).
          if (id === 'overlay-trails') {
            window.setTrailsOverlay(visible);
            return;
          }
          if (map.getLayer(id)) {
            map.setLayoutProperty(id, 'visibility', visible ? 'visible' : 'none');
          }
        };

        // Imagery basemap selector — one of 'sat-esri' | 'sat-usgs' | 'opentopo'
        // or null to clear. Mutually exclusive with the others.
        const _imageryLayers = ['imagery-sat-esri', 'imagery-sat-usgs', 'imagery-opentopo'];
        window.setImagery = (id) => {
          for (const lid of _imageryLayers) {
            if (map.getLayer(lid)) {
              map.setLayoutProperty(lid, 'visibility', 'none');
            }
          }
          if (!id) return;
          const target = 'imagery-' + id;
          if (map.getLayer(target)) {
            map.setLayoutProperty(target, 'visibility', 'visible');
          }
        };

        // Hybrid view — when on, hide every protomaps FILL layer so the
        // imagery shows through; keep line/symbol layers (roads, labels).
        window.setHybrid = (on) => {
          const layers = map.getStyle().layers || [];
          for (const l of layers) {
            if (l.type === 'fill' && l.source === 'protomaps') {
              map.setLayoutProperty(l.id, 'visibility', on ? 'none' : 'visible');
            }
          }
        };

        // Fetch + populate current US wildfire perimeters from NIFC. Refreshed
        // on demand; cheap because the FeatureService is well-cached.
        window.refreshWildfires = async () => {
          try {
            const url = 'https://services3.arcgis.com/T4QMspbfLg3qTGWY/' +
              'arcgis/rest/services/WFIGS_Interagency_Perimeters_Current/' +
              'FeatureServer/0/query?where=1%3D1&outFields=IncidentName,GISAcres&' +
              'f=geojson';
            const resp = await fetch(url);
            if (!resp.ok) { log('wildfires fetch ' + resp.status); return; }
            const data = await resp.json();
            const src = map.getSource('wildfires');
            if (src) src.setData(data);
            log('wildfires: ' + (data.features || []).length + ' features');
          } catch (e) {
            log('wildfires fetch fail: ' + e.message);
          }
        };
        // Live-scale the terrain height (driven by the in-app slider).
        window.setExaggeration = (e) => {
          demExag = e;
          if (terrainOn) map.setTerrain({ source: 'demT', exaggeration: e });
        };
        // Snappier camera move — flyTo's default arc takes 2+ s on close moves
        // (the camera zooms out then back in). easeTo with a fixed short
        // duration feels instant on a recenter tap.
        window.flyTo = (lng, lat, zoom) => {
          const t0 = Date.now();
          log('flyTo start');
          map.easeTo({ center: [lng, lat], zoom: zoom || 13, duration: 500 });
          map.once('moveend', () => log('flyTo settled +' + (Date.now() - t0) + 'ms'));
          map.once('idle', () => log('flyTo idle +' + (Date.now() - t0) + 'ms'));
        };
        window.setDraft = (gj) => { const s = map.getSource('draft'); if (s) s.setData(gj); };
        window.setSearch = (gj) => { const s = map.getSource('search'); if (s) s.setData(gj); };
        // Trail-highlight overlay. Fed a GeoJSON FeatureCollection (usually
        // a single LineString) when the user taps a trail; cleared when the
        // info sheet closes or they pick a different segment.
        window.setHighlightTrail = (gj) => {
          const s = map.getSource('highlight-trail-src');
          if (s) s.setData(gj);
        };
        window.clearHighlightTrail = () => {
          const s = map.getSource('highlight-trail-src');
          if (s) s.setData({ type: 'FeatureCollection', features: [] });
        };
        window.getCenter = () => { const c = map.getCenter(); return JSON.stringify({ lng: c.lng, lat: c.lat }); };

        // Constrain panning to a bbox. Used to keep the user inside the
        // downloaded region so we don't silently stream global DEM tiles.
        // null clears the lock (e.g. when the user explicitly wants to
        // scout further). MapLibre snaps the camera back inside the bbox
        // on the next user interaction if they were already outside.
        window.setMaxBounds = (minLng, minLat, maxLng, maxLat) => {
          map.setMaxBounds([[minLng, minLat], [maxLng, maxLat]]);
        };
        window.clearMaxBounds = () => { map.setMaxBounds(null); };

        // Trails & tracks overlay state. The colored split layers
        // (roads_hike + roads_orv) start hidden via wa_layers.json so the
        // basemap renders trails in its own neutral colors. When the user
        // turns on the "Trails & tracks" overlay we make them visible,
        // subject to the activity filter. When they turn it off, both go
        // back to hidden — basemap stays clean.
        //
        // Two pieces of state, one apply function so order-of-operations
        // doesn't matter (overlay can be enabled before or after the user
        // picks an activity).
        let _trailsOverlayOn = false;
        let _trailsActivity = 'all';

        function _applyTrailsVisibility() {
          const vis = (id, on) => {
            if (map.getLayer(id)) {
              map.setLayoutProperty(id, 'visibility', on ? 'visible' : 'none');
            }
          };
          if (!_trailsOverlayOn) {
            vis('roads_hike', false);
            vis('roads_orv', false);
            return;
          }
          if (_trailsActivity === 'hike') {
            vis('roads_hike', true);
            vis('roads_orv', false);
          } else if (_trailsActivity === 'orv') {
            vis('roads_hike', false);
            vis('roads_orv', true);
          } else { // 'all' or unknown
            vis('roads_hike', true);
            vis('roads_orv', true);
          }
        }

        // Toggle the colored trail overlay on/off. When off, the green hike
        // / orange ORV split layers are hidden and the basemap renders
        // trails in whatever color it normally would.
        window.setTrailsOverlay = (on) => {
          _trailsOverlayOn = !!on;
          _applyTrailsVisibility();
        };

        // Activity filter: 'all' | 'hike' | 'orv'. Only affects which
        // colored layer renders WHEN the trails overlay is on — when it's
        // off, this is just a setting waiting to be applied.
        window.setActivityFilter = (mode) => {
          _trailsActivity = (mode === 'hike' || mode === 'orv') ? mode : 'all';
          _applyTrailsVisibility();
        };

        // Off-grid-useful POI categories. Maps Protomaps `kind` strings to a
        // grouped human-readable label (and an emoji marker, picked up by the
        // Flutter side for visual distinction).
        const POI_GROUPS = {
          'drinking_water': { group: 'Water', icon: '💧' },
          'toilets':        { group: 'Toilets', icon: '🚻' },
          'peak':           { group: 'Peak / viewpoint', icon: '⛰' },
          'park':           { group: 'Park', icon: '🌳' },
          'garden':         { group: 'Park', icon: '🌳' },
          'forest':         { group: 'Forest', icon: '🌲' },
          'bench':          { group: 'Rest spot', icon: '🪑' },
          'beach':          { group: 'Beach', icon: '🏖' },
          'marina':         { group: 'Marina / boat ramp', icon: '⚓' },
          'aerodrome':      { group: 'Airfield', icon: '🛩' },
          'ferry_terminal': { group: 'Ferry', icon: '⛴' },
          'school':         { group: 'School', icon: '🏫' },
          'library':        { group: 'Library', icon: '📚' },
          'university':     { group: 'University', icon: '🎓' },
          'stadium':        { group: 'Stadium', icon: '🏟' },
          'station':        { group: 'Station', icon: '🚉' },
          'bus_stop':       { group: 'Bus stop', icon: '🚌' },
          'zoo':            { group: 'Zoo', icon: '🦓' },
          'animal':         { group: 'Animal area', icon: '🐾' },
        };

        // Returns nearby POIs (currently-loaded tiles) as a JSON-serialized
        // list sorted by distance. The current viewport's source tiles define
        // the search window — zoom in if the user wants more.
        window.nearbyPois = () => {
          const center = map.getCenter();
          const cp = map.project(center);
          // Source features from the 'pois' layer in the protomaps vector source.
          let feats = [];
          try {
            feats = map.querySourceFeatures('protomaps', { sourceLayer: 'pois' });
          } catch (e) { return JSON.stringify([]); }
          const seen = new Set();
          const out = [];
          for (const f of feats) {
            const kind = f.properties && f.properties.kind;
            const name = f.properties && f.properties.name;
            if (!name || !POI_GROUPS[kind]) continue;
            // Dedup by (name+kind+rounded coord) — vector tiles repeat features.
            const c = f.geometry && f.geometry.coordinates;
            if (!c) continue;
            const key = name + '|' + kind + '|' + c[0].toFixed(4) + '|' + c[1].toFixed(4);
            if (seen.has(key)) continue;
            seen.add(key);
            const p = map.project(c);
            const dx = p.x - cp.x, dy = p.y - cp.y;
            // Pixel distance is sufficient for sorting; we also surface meters.
            const meters = map.unproject(p).distanceTo(center);
            out.push({
              name: name,
              kind: kind,
              group: POI_GROUPS[kind].group,
              icon: POI_GROUPS[kind].icon,
              lng: c[0],
              lat: c[1],
              meters: meters,
              px: Math.sqrt(dx*dx + dy*dy),
            });
          }
          out.sort((a, b) => a.meters - b.meters);
          return JSON.stringify(out.slice(0, 60));
        };

        // Stream camera changes (bearing + zoom + center) up to Flutter so the
        // compass FAB + scale bar can update without rebuilding the screen.
        //
        // Constraints learned the hard way:
        // - `rotate` only fires for USER drag-rotate; `easeTo` is silent there.
        //   `move` fires for both, so use it instead.
        // - `move` fires ~60×/s during animations. Throttle to ~20 Hz max to
        //   avoid flooding the JS↔Dart bridge (caused renderer crashes).
        // - Throttle can drop the final emit — always force-emit on `moveend`
        //   so the FAB hides correctly when the reset animation finishes.
        let _lastBearing = 0, _lastZoom = -1, _lastEmitMs = 0;
        const _emitCamera = (force) => {
          const now = Date.now();
          if (!force && now - _lastEmitMs < 50) return;
          const c = map.getCenter();
          const b = map.getBearing();
          const z = map.getZoom();
          if (!force &&
              Math.abs(b - _lastBearing) < 0.5 &&
              Math.abs(z - _lastZoom) < 0.05) return;
          _lastBearing = b; _lastZoom = z; _lastEmitMs = now;
          if (window.flutter_inappwebview) {
            window.flutter_inappwebview.callHandler('cameraChanged',
              JSON.stringify({ bearing: b, zoom: z, lat: c.lat, lng: c.lng }));
          }
        };
        map.on('move', () => _emitCamera(false));
        map.on('moveend', () => _emitCamera(true));

        // Programmatically set the map bearing — used by heading-up mode to
        // keep the user's travel direction "up" as they move.
        window.setBearing = (deg) => {
          if (typeof deg !== 'number' || !isFinite(deg)) return;
          map.easeTo({ bearing: deg, duration: 250 });
        };

        // Snap the camera back to north (driven by the compass FAB).
        window.resetBearing = () => {
          const t0 = Date.now();
          log('resetBearing start');
          map.easeTo({ bearing: 0, duration: 400 });
          map.once('moveend', () => log('resetBearing settled +' + (Date.now() - t0) + 'ms'));
          map.once('idle', () => log('resetBearing idle +' + (Date.now() - t0) + 'ms'));
        };

        // When Flutter is in "placement mode" (pin / waypoint placement), the
        // click handler skips the hit-tests entirely and just reports the
        // tap coordinate, so the user can drop the new pin/waypoint directly
        // on top of an existing route or pin without re-opening its drawer.
        let _placementMode = 'none';
        window.setPlacementMode = (mode) => { _placementMode = mode || 'none'; };

        // Tap → Flutter. Priority: member dot > pin > route > empty map.
        // (Skipped entirely when in placement mode.)
        map.on('click', (e) => {
          if (!window.flutter_inappwebview) return;
          if (_placementMode !== 'none') {
            window.flutter_inappwebview.callHandler('mapTap',
              JSON.stringify({ lng: e.lngLat.lng, lat: e.lngLat.lat }));
            return;
          }
          // Generous hit pad for the member dot — fingers are imprecise on
          // a small symbol on a busy map.
          const memBox = [
            [e.point.x - 24, e.point.y - 24],
            [e.point.x + 24, e.point.y + 24],
          ];
          // Use the invisible-circle hit target (members-hit) — symbol-layer
          // hit-tests are tight to the rendered glyph and unreliable.
          const memHit = map.getLayer('members-hit')
            ? map.queryRenderedFeatures(memBox, { layers: ['members-hit'] })
            : [];
          if (memHit.length) {
            window.flutter_inappwebview.callHandler('memberTap',
              String(memHit[0].properties.id || ''));
            return;
          }
          const pinHit = map.queryRenderedFeatures(e.point, { layers: ['pins-dot'] });
          if (pinHit.length) {
            window.flutter_inappwebview.callHandler('pinTap',
              String(pinHit[0].properties.id || ''));
            return;
          }
          // Wider hit area than the visible line — devicePixelRatio is ~3.5 so
          // 4-px stroke is only ~12 device px to land a finger on. 36 px box
          // is forgiving without grabbing unrelated routes.
          const pad = 36;
          const box = [
            [e.point.x - pad, e.point.y - pad],
            [e.point.x + pad, e.point.y + pad],
          ];
          const routeHit = map.queryRenderedFeatures(box, { layers: ['routes-line'] });
          if (routeHit.length) {
            window.flutter_inappwebview.callHandler('routeTap',
              String(routeHit[0].properties.id || ''));
            return;
          }
          // Trail / minor-road tap → pop an info sheet on the Flutter side.
          // We test all the layers that surface the `roads_other` source-layer
          // (paths, tracks, unclassified ways and their bridge/tunnel variants)
          // so the user can tap any rendered trail and get its name + props.
          const trailLayers = [
            'roads_hike',
            'roads_orv',
            'roads_other',          // legacy: pre-split tiles render through here
            'roads_bridges_other',
            'roads_tunnels_other',
          ].filter(id => !!map.getLayer(id));
          if (trailLayers.length) {
            const trailHit = map.queryRenderedFeatures(box, { layers: trailLayers });
            if (trailHit.length) {
              const f = trailHit[0];
              const p = f.properties || {};
              // Geometry of the rendered segment — fed back so Dart can
              // sample elevation and (in route-designer mode) append the
              // line to the active route draft.
              const geom = (f.geometry && f.geometry.type === 'LineString')
                ? f.geometry.coordinates
                : (f.geometry && f.geometry.type === 'MultiLineString')
                  ? (f.geometry.coordinates[0] || [])
                  : [];
              window.flutter_inappwebview.callHandler('trailTap',
                JSON.stringify({
                  tapLng: e.lngLat.lng,
                  tapLat: e.lngLat.lat,
                  name: p.name || '',
                  kind: p.kind || p['pmap:kind'] || '',
                  kindDetail: p.kind_detail || p['pmap:kind_detail'] || '',
                  surface: p.surface || '',
                  // Geometry as [[lng,lat], ...] in tile-pixel order; Dart
                  // converts to LatLng. Limited to ~500 points to keep the
                  // bridge payload small even on heavily-curved ways.
                  coords: geom.slice(0, 500),
                }));
              return;
            }
          }
          window.flutter_inappwebview.callHandler('mapTap',
            JSON.stringify({ lng: e.lngLat.lng, lat: e.lngLat.lat }));
        });

        // Selected route highlight — driven by `setSelectedRoute(id|null)`.
        // Selected route: bright yellow, thicker line. Others: each route's
        // own color (falls back to amber). No blur/glow layer — that allocates
        // per-route framebuffers and crashed the renderer on this device.
        let _selectedRouteId = '';
        window.setSelectedRoute = (id) => {
          _selectedRouteId = id || '';
          if (!map.getLayer('routes-line')) return;
          map.setPaintProperty('routes-line', 'line-color', [
            'case',
            ['==', ['get', 'id'], _selectedRouteId],
            '#ffeb3b',
            ['coalesce', ['get', 'color'], '#D9A441'],
          ]);
          map.setPaintProperty('routes-line', 'line-width', [
            'case',
            ['==', ['get', 'id'], _selectedRouteId], 6, 4,
          ]);
        };

        map.on('load', () => {
          // Default 2D (no terrain) for low GL memory + reliable markers.
          // 3D terrain is enabled on demand via setMode(true).

          // BASEMAP IMAGERY LAYERS — inserted BELOW the `earth` fill so the
          // vector basemap covers them by default. Only one shown at a time
          // via setImagery(). When "Hybrid" is on, the basemap's fill layers
          // (earth + landcover + landuse_*) get visibility:none, so the
          // imagery shines through up to the road/label layers — that's
          // what makes hybrid mode meaningful. Without the beforeId here,
          // addLayer appends to the TOP of the stack and imagery covers
          // everything including roads + labels (the previous bug: trails
          // invisible on satellite + opentopo, hybrid toggle a no-op).
          const _IMAGERY_BEFORE = map.getLayer('earth') ? 'earth' : undefined;
          map.addLayer({ id: 'imagery-sat-esri', type: 'raster', source: 'sat-esri',
            layout: { visibility: 'none' },
            paint: { 'raster-opacity': 1.0 } }, _IMAGERY_BEFORE);
          map.addLayer({ id: 'imagery-sat-usgs', type: 'raster', source: 'sat-usgs',
            layout: { visibility: 'none' },
            paint: { 'raster-opacity': 1.0 } }, _IMAGERY_BEFORE);
          map.addLayer({ id: 'imagery-opentopo', type: 'raster', source: 'opentopo',
            layout: { visibility: 'none' },
            paint: { 'raster-opacity': 1.0 } }, _IMAGERY_BEFORE);

          // OVERLAYS — drawn on TOP of the vector basemap.
          // `usgs-topo` covers the basemap as a translucent topo overlay;
          // `overlay-trails` highlights tracks/paths from the same PMTiles
          // data so it works offline.
          map.addLayer({ id: 'usgs-topo', type: 'raster', source: 'usgs-topo',
            layout: { visibility: 'none' },
            paint: { 'raster-opacity': 0.85 } });
          map.addLayer({ id: 'blm-sma', type: 'raster', source: 'blm-sma',
            layout: { visibility: 'none' },
            paint: { 'raster-opacity': 0.55 } });
          // Wildfires: fill (translucent red) + outline (bold red).
          map.addLayer({ id: 'wildfires-fill', type: 'fill', source: 'wildfires',
            layout: { visibility: 'none' },
            paint: { 'fill-color': '#ff3d00', 'fill-opacity': 0.30 } });
          map.addLayer({ id: 'wildfires-line', type: 'line', source: 'wildfires',
            layout: { visibility: 'none', 'line-cap': 'round', 'line-join': 'round' },
            paint: { 'line-color': '#ff3d00', 'line-width': 2 } });
          // 'overlay-trails' used to live here as a separate orange highlight
          // layer over kind ∈ [path, other]. Its role is now played by the
          // split roads_hike + roads_orv layers (in wa_layers.json, hidden
          // by default, made visible together via setTrailsOverlay). Old
          // placeholder noop layer removed — it was dead code with a
          // never-matching filter and added nothing.

          // Party overlays (drawn above terrain/labels).
          // Live recording breadcrumb — red dashed line so it reads distinct
          // from saved shared routes (which use line-color from each feature).
          map.addSource('track', { type: 'geojson', data: EMPTY });
          map.addLayer({ id: 'track-line', type: 'line', source: 'track',
            layout: { 'line-cap': 'round', 'line-join': 'round' },
            paint: {
              'line-color': '#ff5252',
              'line-width': 4,
              'line-dasharray': [2, 1],
            } });

          map.addSource('routes', { type: 'geojson', data: EMPTY });
          map.addLayer({ id: 'routes-line', type: 'line', source: 'routes',
            layout: { 'line-cap': 'round', 'line-join': 'round' },
            paint: {
              'line-color': ['coalesce', ['get', 'color'], '#D9A441'],
              'line-width': 4,
            } });
          // Per-route waypoints (rest stops / water / hazards) drawn ABOVE the
          // route line. Emoji symbol from the waypoint's `icon` property.
          map.addSource('route-waypoints', { type: 'geojson', data: EMPTY });
          map.addLayer({ id: 'route-waypoints-dot', type: 'symbol', source: 'route-waypoints',
            layout: { 'text-field': ['get', 'icon'], 'text-size': 22,
              'text-allow-overlap': true, 'text-ignore-placement': true },
            paint: { 'text-halo-color': '#ffffff', 'text-halo-width': 1.5 } });
          map.addLayer({ id: 'route-waypoints-label', type: 'symbol', source: 'route-waypoints',
            layout: { 'text-field': ['get', 'name'], 'text-font': ['NotoSansRegular'],
              'text-size': 11, 'text-offset': [0, 1.2], 'text-anchor': 'top',
              'text-allow-overlap': true, 'text-ignore-placement': true },
            paint: { 'text-color': '#fff', 'text-halo-color': '#000', 'text-halo-width': 1.2 } });

          map.addSource('pins', { type: 'geojson', data: EMPTY });
          map.addLayer({ id: 'pins-dot', type: 'symbol', source: 'pins',
            layout: { 'text-field': '●', 'text-font': ['NotoSansRegular'], 'text-size': 20,
              'text-allow-overlap': true, 'text-ignore-placement': true },
            paint: { 'text-color': '#D9A441', 'text-halo-color': '#1c1e1a', 'text-halo-width': 1.5 } });
          map.addLayer({ id: 'pins-label', type: 'symbol', source: 'pins',
            layout: { 'text-field': ['get', 'name'], 'text-font': ['NotoSansRegular'], 'text-size': 11,
              'text-offset': [0, 0.9], 'text-anchor': 'top',
              'text-allow-overlap': true, 'text-ignore-placement': true },
            paint: { 'text-color': '#fff', 'text-halo-color': '#000', 'text-halo-width': 1.2 } });
          // Measurement tool layers — line + vertex dots, cyan to distinguish
          // from saved routes.
          map.addSource('measure', { type: 'geojson', data: EMPTY });
          map.addLayer({ id: 'measure-line', type: 'line', source: 'measure',
            filter: ['==', ['get', 'kind'], 'line'],
            layout: { 'line-cap': 'round', 'line-join': 'round' },
            paint: { 'line-color': '#26c6da', 'line-width': 3,
              'line-dasharray': [2, 1] } });
          map.addLayer({ id: 'measure-vertex', type: 'circle', source: 'measure',
            filter: ['==', ['get', 'kind'], 'vertex'],
            paint: { 'circle-radius': 5, 'circle-color': '#26c6da',
              'circle-stroke-width': 2, 'circle-stroke-color': '#ffffff' } });

          map.addSource('draft', { type: 'geojson', data: EMPTY });
          map.addLayer({ id: 'draft-line', type: 'line', source: 'draft',
            layout: { 'line-cap': 'round', 'line-join': 'round' },
            paint: { 'line-color': '#4fc3f7', 'line-width': 4, 'line-dasharray': [2, 1] } });
          // Highlight overlay for the trail-info sheet — bright cyan so it
          // pops over both hike-green and ORV-orange. Source is fed by Dart
          // via setHighlightTrail / clearHighlightTrail when the sheet
          // opens / closes (or when the user is considering a segment).
          map.addSource('highlight-trail-src',
            { type: 'geojson', data: EMPTY });
          map.addLayer({
            id: 'highlight-trail-layer', type: 'line',
            source: 'highlight-trail-src',
            layout: { 'line-cap': 'round', 'line-join': 'round' },
            paint: {
              'line-color': '#00e5ff', 'line-width': 6, 'line-opacity': 0.95,
            },
          });
          map.addSource('search', { type: 'geojson', data: EMPTY });
          map.addLayer({ id: 'search-dot', type: 'circle', source: 'search',
            paint: { 'circle-radius': 7, 'circle-color': '#ff5252',
              'circle-stroke-width': 2, 'circle-stroke-color': '#fff' } });
          map.addSource('members', { type: 'geojson', data: EMPTY });
          // Pulsing halo around the SELF member's dot — heartbeat animation
          // driven by a setInterval below. Drawn first so it sits BELOW the
          // dot/glyph and reads as a soft glow rather than overlapping text.
          map.addLayer({ id: 'members-self-pulse', type: 'circle', source: 'members',
            filter: ['==', ['get', 'self'], true],
            paint: {
              'circle-radius': 16,
              'circle-color': ['coalesce', ['get', 'color'], '#D9A441'],
              'circle-opacity': 0.4,
              'circle-blur': 0.4,
            } });
          // Directional wedge for the self member — only rendered when GPS
          // reports a heading. Rotated to match the heading.
          map.addLayer({ id: 'members-self-arrow', type: 'symbol', source: 'members',
            filter: ['all',
              ['==', ['get', 'self'], true],
              ['==', ['get', 'hasHeading'], true]
            ],
            layout: {
              'text-field': '▲',
              'text-font': ['NotoSansRegular'],
              'text-size': 16,
              'text-rotate': ['get', 'heading'],
              'text-rotation-alignment': 'map',
              'text-offset': [0, -1.4],
              'text-allow-overlap': true,
              'text-ignore-placement': true,
            },
            paint: {
              'text-color': ['coalesce', ['get', 'color'], '#D9A441'],
              'text-halo-color': '#ffffff',
              'text-halo-width': 2,
            } });
          // Invisible hit-target circle above each member — bigger than the
          // glyph, transparent, but caught reliably by queryRenderedFeatures.
          map.addLayer({ id: 'members-hit', type: 'circle', source: 'members',
            paint: { 'circle-radius': 22, 'circle-opacity': 0 } });
          map.addLayer({ id: 'members-dot', type: 'symbol', source: 'members',
            layout: { 'text-field': '●', 'text-font': ['NotoSansRegular'], 'text-size': 26,
              'text-allow-overlap': true, 'text-ignore-placement': true },
            paint: { 'text-color': ['to-color', ['get', 'color']],
              'text-halo-color': '#ffffff', 'text-halo-width': 2 } });
          map.addLayer({ id: 'members-label', type: 'symbol', source: 'members',
            layout: { 'text-field': ['get', 'callsign'], 'text-font': ['NotoSansRegular'], 'text-size': 12,
              'text-offset': [0, -1.2], 'text-anchor': 'bottom',
              'text-allow-overlap': true, 'text-ignore-placement': true },
            paint: { 'text-color': '#fff', 'text-halo-color': '#000', 'text-halo-width': 1.6 } });
          // Pulse the self-member halo — 1 Hz heartbeat. Cheap: just two
          // setPaintProperty calls per frame; doesn't touch the source.
          let _pulsePhase = 0;
          setInterval(() => {
            if (!map.getLayer('members-self-pulse')) return;
            _pulsePhase = (_pulsePhase + 0.08) % (Math.PI * 2);
            const t = (Math.sin(_pulsePhase) + 1) / 2; // 0..1
            map.setPaintProperty('members-self-pulse', 'circle-radius', 14 + t * 10);
            map.setPaintProperty('members-self-pulse', 'circle-opacity', 0.18 + (1 - t) * 0.35);
          }, 80);

          log('ready');
          if (window.flutter_inappwebview) window.flutter_inappwebview.callHandler('mapReady');
        });
        map.on('error', (e) => log('err: ' + ((e && e.error && e.error.message) || (e && e.type))));
      } catch (e) { log('init fail: ' + e.message); }
    })();
  </script>
</body>
</html>
